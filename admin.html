<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shinigami Couture - Адмін-панель</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">
    <!-- Custom Cursor -->
    <div class="custom-cursor" id="custom-cursor"></div>

    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="logo"><img src="img/logo/shinigami.webp" alt="logo"></a>
                <button id="logout-btn" style="background: transparent; color: #000; border: 2px solid #000; padding: 2px 8px; font-weight: 800; cursor: pointer; font-size: 10px; margin-left: 10px;">ВИЙТИ</button>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-tab="dashboard">
                    <span class="nav-icon">📊</span> Дашборд
                </a>
                <a href="#" class="nav-item" data-tab="products">
                    <span class="nav-icon">📦</span> Товари
                </a>
                <a href="index.html" class="nav-item">
                    <span class="nav-icon">🌐</span> На сайт
                </a>
            </nav>
            <div class="sidebar-footer">
                <p>&copy; 2026 Admin UI</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-content">
            <header class="content-header">
                <h1 id="page-title">Дашборд</h1>
                <div class="header-actions">
                    <button id="add-product-btn" class="btn-primary" style="padding: 10px 20px; font-size: 0.8rem;">+ ДОДАТИ ТОВАР</button>
                    <div class="user-profile">
                        <span class="user-name">Xamilio</span>
                        <div class="user-avatar">AD</div>
                    </div>
                </div>
            </header>

            <section id="dashboard-tab" class="tab-content active">
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Усього товарів</h3>
                        <p class="stat-value" id="total-products-count">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Передзамовлення</h3>
                        <p class="stat-value" id="preorder-count">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Розпродано</h3>
                        <p class="stat-value" id="soldout-count">0</p>
                    </div>
                </div>
                
                <div class="recent-products-section">
                    <h2>Останні додані товари</h2>
                    <div class="table-container">
                        <table id="recent-products-table">
                            <thead>
                                <tr>
                                    <th>Товар</th>
                                    <th>Ціна</th>
                                    <th>Статус</th>
                                    <th>Дії</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <section id="products-tab" class="tab-content">
                <div class="table-container">
                    <table id="all-products-table">
                        <thead>
                            <tr>
                                <th>Зображення</th>
                                <th>Назва</th>
                                <th>Ціна</th>
                                <th>Передзамовлення</th>
                                <th>Дії</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Product Modal -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Додати товар</h2>
                <button class="close-modal">&times;</button>
            </div>
            <form id="product-form">
                <input type="hidden" id="product-index">
                <div class="form-group">
                    <label for="title">Назва товару</label>
                    <input type="text" id="title" required placeholder="Напр: BLACK HOODIE">
                </div>
                <div class="form-group">
                    <label for="price">Ціна (з валютою)</label>
                    <input type="text" id="price" required placeholder="Напр: ₴2,500">
                </div>
                <div class="form-group">
                    <label for="category">Категорія</label>
                    <input type="text" id="category" placeholder="Напр: АКСЕСУАРИ">
                </div>
                <div class="form-group">
                    <label for="image">URL зображення</label>
                    <input type="text" id="image" placeholder="img/products/...">
                </div>
                <div class="form-group">
                    <label for="description">Опис</label>
                    <textarea id="description" rows="3" placeholder="Загальний опис товару..." style="width: 100%; border: 2px solid #000; padding: 10px; font-family: inherit; outline: none;"></textarea>
                </div>
                <div class="form-group">
                    <label for="features">Характеристики (через крапку з комою)</label>
                    <textarea id="features" rows="3" placeholder="Напр: Натуральна шкіра; Блискавка YKK..." style="width: 100%; border: 2px solid #000; padding: 10px; font-family: inherit; outline: none;"></textarea>
                </div>
                <div class="form-group">
                    <label for="material">Матеріал</label>
                    <input type="text" id="material" placeholder="Напр: 100% Cotton">
                </div>
                <div class="form-group">
                    <label for="delivery">Доставка</label>
                    <input type="text" id="delivery" placeholder="Напр: Нова Пошта; 1-3 дні">
                </div>
                <div class="form-group">
                    <label for="sku">ID / SKU</label>
                    <input type="text" id="sku" placeholder="Напр: SN-001">
                </div>
                <div class="form-group">
                    <label for="care">Рекомендації по догляду</label>
                    <input type="text" id="care" placeholder="Напр: Тільки ручне прання">
                </div>
                <div class="form-group">
                    <label for="packageContents">Комплектація</label>
                    <input type="text" id="packageContents" placeholder="Напр: Рюкзак, брелок, стікерпак">
                </div>
                <div class="form-group">
                    <label>Статус товару</label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="product-status" value="none" checked> Звичайний
                        </label>
                        <label>
                            <input type="radio" name="product-status" value="new"> Новинка (NEW)
                        </label>
                        <label>
                            <input type="radio" name="product-status" value="preorder"> Передзамовлення (PRE)
                        </label>
                        <label>
                            <input type="radio" name="product-status" value="soldout"> Розпродано (SOLD)
                        </label>
                    </div>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">ЗБЕРЕГТИ</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
    <script src="admin.js"></script>
</body>
</html>
