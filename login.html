<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід — Shinigami Couture Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --bg-color: #ffffff;
            --main-black: #000;
            --main-white: #fff;
            --font-main: 'Outfit', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-main);
            cursor: none !important;
        }

        body {
            background-color: var(--bg-color);
            color: var(--main-black);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
            overflow: hidden;
            background-image: radial-gradient(rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .login-card {
            background: var(--main-white);
            border: 4px solid var(--main-black);
            padding: 60px 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 20px 20px 0px var(--main-black);
            position: relative;
            animation: slideIn 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideIn {
            from { transform: translate(-20px, -20px); opacity: 0; }
            to { transform: translate(0, 0); opacity: 1; }
        }

        .login-card::before {
            content: "SECURE ACCESS";
            position: absolute;
            top: -22px;
            left: 20px;
            background: var(--main-black);
            color: var(--main-white);
            padding: 4px 16px;
            font-weight: 800;
            font-size: 12px;
            letter-spacing: 3px;
        }

        h1 {
            font-size: 48px;
            font-weight: 900;
            line-height: 0.85;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: 800;
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 2px;
            opacity: 0.6;
        }

        input {
            width: 100%;
            padding: 18px;
            border: 3px solid var(--main-black);
            font-size: 16px;
            font-weight: 600;
            outline: none;
            transition: transform 0.2s, box-shadow 0.2s;
            border-radius: 0;
        }

        input:focus {
            transform: translate(-4px, -4px);
            box-shadow: 4px 4px 0px var(--main-black);
        }

        button {
            width: 100%;
            background: var(--main-black);
            color: var(--main-white);
            border: 3px solid var(--main-black);
            padding: 22px;
            font-size: 18px;
            font-weight: 900;
            cursor: none;
            text-transform: uppercase;
            margin-top: 15px;
            letter-spacing: 5px;
            transition: background 0.3s, color 0.3s, transform 0.2s;
        }

        button:hover {
            background: transparent;
            color: #000;
        }

        button:active {
            transform: scale(0.98);
        }

        .error-message {
            background: #000;
            color: #fff;
            padding: 15px;
            margin-bottom: 25px;
            font-weight: 600;
            font-size: 0.9rem;
            display: none;
            border-left: 10px solid #ff4444;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 24px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading-overlay">ЗАВАНТАЖЕННЯ...</div>

    <div class="custom-cursor" id="custom-cursor"></div>

    <div class="login-card">
        <h1>Вхід в<br>адмінку</h1>
        
        <div id="error-msg" class="error-message"></div>

        <form id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="admin@example.com">
            </div>
            
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <button type="submit">УВІЙТИ</button>
        </form>
    </div>

    <!-- SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
    <script>
        // Simple cursor driver for login page
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
        document.addEventListener('mouseover', (e) => {
            if (e.target.closest('button, input, a')) {
                cursor.classList.add('hover');
            } else {
                cursor.classList.remove('hover');
            }
        });
    </script>
</body>
</html>
